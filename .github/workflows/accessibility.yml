name: Accessibility checks (Pa11y)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  pa11y:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          HTTP_PORT=8080
          PHPMYADMIN_PORT=8081
          DB_NAME=esame_web
          DB_USER=utente_fallback
          DB_PASSWORD=password_fallback_sicura_123
          DB_ROOT_PASSWORD=root_password_sicura_123
          EOF

      - name: Start database service
        run: docker compose -f docker-compose.develop.yml up -d db

      - name: Wait for database
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.develop.yml exec -T db sh -lc 'mariadb-admin ping -h 127.0.0.1 -u"$DB_USER" -p"$DB_PASSWORD" --silent' > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.develop.yml logs db --tail=200
          exit 1

      - name: Start web service
        run: docker compose -f docker-compose.develop.yml up -d --build web

      - name: Wait for application
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/index.php > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.develop.yml logs web --tail=200
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Discover public pages from sitemap
        run: |
          mkdir -p .tmp/pa11y
          node .github/scripts/public-pages.mjs --format=text > .tmp/public-pages.txt
          echo "Pages under test:"
          cat .tmp/public-pages.txt

      - name: Install Pa11y
        run: npm install -g pa11y

      - name: Create Pa11y config
        run: |
          cat > pa11y-config.json <<'EOF'
          {
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-setuid-sandbox", "--disable-dev-shm-usage"]
            },
            "standard": "WCAG2AA"
          }
          EOF

      - name: Run Pa11y on public pages
        id: pa11y_run
        run: |
          set +e
          failed=0
          while IFS= read -r page; do
            url="http://127.0.0.1:8080/${page}"
            echo "Checking accessibility for ${url}"
            report=".tmp/pa11y/${page%.php}.json"
            status=0
            pa11y --config pa11y-config.json --reporter json "${url}" > "${report}" || status=$?
            node -e '
              const fs = require("fs");
              const items = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              console.log(`Issues found: ${items.length}`);
              if (items.length === 0) {
                console.log("No accessibility issues detected by Pa11y.");
              } else {
                for (const item of items.slice(0, 10)) {
                  console.log(`- [${item.type}] ${item.message}`);
                  if (item.selector) console.log(`  selector: ${item.selector}`);
                  if (item.context) console.log(`  context: ${item.context.replace(/\s+/g, " ").trim()}`);
                }
              }
              console.log("");
            ' "${report}"
            if [ "${status}" -ne 0 ]; then
              failed=1
            fi
          done < .tmp/public-pages.txt
          echo "failed=${failed}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build Pa11y summary
        if: always()
        run: node .github/scripts/pa11y-summary.mjs --reports-dir=.tmp/pa11y --pages-file=.tmp/public-pages.txt --output-json=.tmp/pa11y/summary.json --step-summary="${GITHUB_STEP_SUMMARY}"

      - name: Upload Pa11y reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-reports
          path: .tmp/pa11y

      - name: Fail workflow if accessibility issues were found
        if: always() && steps.pa11y_run.outputs.failed == '1'
        run: exit 1

      - name: Print application logs on failure
        if: failure()
        run: docker compose -f docker-compose.develop.yml logs web --tail=200

      - name: Stop application stack
        if: always()
        run: docker compose -f docker-compose.develop.yml down -v
