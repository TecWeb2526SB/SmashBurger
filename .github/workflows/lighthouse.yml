name: Lighthouse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          HTTP_PORT=8080
          PHPMYADMIN_PORT=8081
          DB_NAME=esame_web
          DB_USER=utente_fallback
          DB_PASSWORD=password_fallback_sicura_123
          DB_ROOT_PASSWORD=root_password_sicura_123
          EOF

      - name: Start database service
        run: docker compose -f docker-compose.develop.yml up -d db

      - name: Wait for database
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.develop.yml exec -T db sh -lc 'mariadb-admin ping -h 127.0.0.1 -u"$DB_USER" -p"$DB_PASSWORD" --silent' > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.develop.yml logs db --tail=200
          exit 1

      - name: Start web service
        run: docker compose -f docker-compose.develop.yml up -d --build web

      - name: Wait for application
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.develop.yml logs web --tail=200
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Discover public pages from sitemap
        run: |
          mkdir -p .tmp/lighthouse
          node .github/scripts/public-pages.mjs --format=text > .tmp/public-pages.txt
          echo "Pages under test:"
          cat .tmp/public-pages.txt

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse on public pages
        id: lighthouse_run
        run: |
          set +e
          failed=0
          while IFS= read -r page; do
            slug="${page#/}"
            slug="${slug%/}"
            if [ -z "${slug}" ]; then
              slug="home"
            fi
            slug="${slug//\//__}"
            url="http://127.0.0.1:8080${page}"
            report=".tmp/lighthouse/${slug}.json"
            echo "Running Lighthouse on ${url}"
            lighthouse "${url}" \
              --output=json \
              --output-path="${report}" \
              --quiet \
              --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage"
            status=$?
            if [ "${status}" -ne 0 ]; then
              failed=1
              echo "Lighthouse execution failed for ${page}"
              continue
            fi
            node -e '
              const fs = require("fs");
              const report = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              console.log(`Page title: ${report.finalDisplayedUrl || report.finalUrl}`);
              const scores = Object.entries(report.categories)
                .map(([key, value]) => `${key}: ${Math.round((value.score || 0) * 100)}`)
                .join(" | ");
              console.log(scores);
              const failing = Object.values(report.audits)
                .filter((audit) => audit.scoreDisplayMode !== "notApplicable" && audit.score !== null && audit.score < 1)
                .sort((a, b) => (a.score ?? 1) - (b.score ?? 1))
                .slice(0, 8);
              if (failing.length > 0) {
                console.log("Top audits below 100:");
                for (const audit of failing) {
                  const score = Math.round((audit.score || 0) * 100);
                  console.log(`- ${audit.id}: ${score} | ${audit.title}`);
                }
              } else {
                console.log("All applicable audits scored 100.");
              }
              console.log("");
            ' "${report}"
          done < .tmp/public-pages.txt
          echo "failed=${failed}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build Lighthouse summary
        if: always()
        run: node .github/scripts/lighthouse-summary.mjs --reports-dir=.tmp/lighthouse --pages-file=.tmp/public-pages.txt --output-json=.tmp/lighthouse/summary.json --step-summary="${GITHUB_STEP_SUMMARY}"

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .tmp/lighthouse

      - name: Fail workflow if Lighthouse execution broke
        if: always() && steps.lighthouse_run.outputs.failed == '1'
        run: exit 1

      - name: Print application logs on failure
        if: failure()
        run: docker compose -f docker-compose.develop.yml logs web --tail=200

      - name: Stop application stack
        if: always()
        run: docker compose -f docker-compose.develop.yml down -v
