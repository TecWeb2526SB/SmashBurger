name: Quality dashboard (Pages)

on:
  workflow_run:
    workflows:
      - Lighthouse CI
      - Accessibility checks (Pa11y)
      - W3C Validators (HTML + CSS)
      - Authenticated internal quality
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: quality-dashboard-pages-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  publish-dashboard:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       (github.event.workflow_run.head_branch == 'develop' || github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_sha || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download workflow summaries
        run: |
          mkdir -p .tmp/pages-source/lighthouse .tmp/pages-source/pa11y .tmp/pages-source/w3c .tmp/pages-source/authenticated

          download_artifact() {
            workflow_file="$1"
            artifact_name="$2"
            target_dir="$3"

            json="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?branch=${TARGET_BRANCH}&status=completed&per_page=20")"

            if [ -n "${TARGET_SHA}" ]; then
              run_id="$(printf '%s' "${json}" | jq -r --arg sha "${TARGET_SHA}" '.workflow_runs | map(select(.head_sha == $sha)) | first | .id // empty')"
            else
              run_id="$(printf '%s' "${json}" | jq -r '.workflow_runs | first | .id // empty')"
            fi

            if [ -z "${run_id}" ]; then
              echo "No completed run found for ${workflow_file} on ${TARGET_BRANCH}."
              return 0
            fi

            rm -rf "${target_dir}"
            mkdir -p "${target_dir}"
            gh run download "${run_id}" -n "${artifact_name}" -D "${target_dir}" || true
          }

          download_artifact "lighthouse.yml" "lighthouse-reports" ".tmp/pages-source/lighthouse"
          download_artifact "accessibility.yml" "pa11y-reports" ".tmp/pages-source/pa11y"
          download_artifact "w3c-validators.yml" "w3c-reports" ".tmp/pages-source/w3c"
          download_artifact "authenticated-quality.yml" "authenticated-quality-reports" ".tmp/pages-source/authenticated"

          cat > .tmp/pages-source/context.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${TARGET_BRANCH}",
            "sha": "${TARGET_SHA}",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Build dashboard site
        run: node .github/scripts/build-quality-pages.mjs --source-dir=.tmp/pages-source --output-dir=.tmp/quality-dashboard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .tmp/quality-dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
