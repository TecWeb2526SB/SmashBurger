name: Quality dashboard (Pages)

on:
  workflow_run:
    workflows:
      - Lighthouse CI
      - Accessibility checks (Pa11y)
      - W3C Validators (HTML + CSS)
      - Authenticated internal quality
    types: [completed]
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch da cui leggere gli artifact quality
        required: false
        default: develop

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: quality-dashboard-pages-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'develop')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GITHUB_TOKEN: ${{ github.token }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.target_branch || 'develop' }}
      TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_sha || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download workflow summaries
        run: |
          set -eu
          mkdir -p .tmp/pages-source/lighthouse .tmp/pages-source/pa11y .tmp/pages-source/w3c .tmp/pages-source/authenticated

          api_get() {
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com$1"
          }

          download_artifact() {
            workflow_file="$1"
            artifact_name="$2"
            target_dir="$3"

            runs_json="$(api_get "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_file}/runs?branch=${TARGET_BRANCH}&status=completed&per_page=20")"

            if [ -n "${TARGET_SHA}" ]; then
              run_id="$(printf '%s' "${runs_json}" | jq -r --arg sha "${TARGET_SHA}" '.workflow_runs | map(select(.head_sha == $sha)) | first | .id // empty')"
            else
              run_id="$(printf '%s' "${runs_json}" | jq -r '.workflow_runs | first | .id // empty')"
            fi

            if [ -z "${run_id}" ]; then
              echo "No completed run found for ${workflow_file} on ${TARGET_BRANCH}."
              return 0
            fi

            artifacts_json="$(api_get "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100")"
            archive_url="$(printf '%s' "${artifacts_json}" | jq -r --arg name "${artifact_name}" '.artifacts | map(select(.name == $name and .expired == false)) | first | .archive_download_url // empty')"

            if [ -z "${archive_url}" ]; then
              echo "Artifact ${artifact_name} not available for run ${run_id}."
              return 0
            fi

            rm -rf "${target_dir}"
            mkdir -p "${target_dir}"

            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${archive_url}" \
              -o "${target_dir}/artifact.zip"

            unzip -oq "${target_dir}/artifact.zip" -d "${target_dir}"
            rm -f "${target_dir}/artifact.zip"
          }

          download_artifact "lighthouse.yml" "lighthouse-reports" ".tmp/pages-source/lighthouse"
          download_artifact "accessibility.yml" "pa11y-reports" ".tmp/pages-source/pa11y"
          download_artifact "w3c-validators.yml" "w3c-reports" ".tmp/pages-source/w3c"
          download_artifact "authenticated-quality.yml" "authenticated-quality-reports" ".tmp/pages-source/authenticated"

          cat > .tmp/pages-source/context.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${TARGET_BRANCH}",
            "sha": "${TARGET_SHA}",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Build dashboard site
        run: node .github/scripts/build-quality-pages.mjs --source-dir=.tmp/pages-source --output-dir=.tmp/quality-dashboard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .tmp/quality-dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
