name: Authenticated internal quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  authenticated-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          HTTP_PORT=8080
          PHPMYADMIN_PORT=8081
          DB_NAME=esame_web
          DB_USER=utente_fallback
          DB_PASSWORD=password_fallback_sicura_123
          DB_ROOT_PASSWORD=root_password_sicura_123
          EOF

      - name: Start database service
        run: docker compose -f docker-compose.develop.yml up -d db

      - name: Wait for database
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.develop.yml exec -T db sh -lc 'mariadb-admin ping -h 127.0.0.1 -u"$DB_USER" -p"$DB_PASSWORD" --silent' > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.develop.yml logs db --tail=200
          exit 1

      - name: Start web service
        run: docker compose -f docker-compose.develop.yml up -d --build web

      - name: Wait for application
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.develop.yml logs web --tail=200
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Lighthouse and Pa11y
        run: npm install -g lighthouse pa11y

      - name: Run authenticated quality checks
        run: node .github/scripts/authenticated-quality.mjs --base-url=http://127.0.0.1:8080 --config=.github/scripts/internal-pages.json --output-dir=.tmp/authenticated-quality --summary-json=.tmp/authenticated-quality/summary.json --step-summary="${GITHUB_STEP_SUMMARY}"

      - name: Upload authenticated quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authenticated-quality-reports
          path: .tmp/authenticated-quality

      - name: Print application logs on failure
        if: failure()
        run: docker compose -f docker-compose.develop.yml logs web --tail=200

      - name: Stop application stack
        if: always()
        run: docker compose -f docker-compose.develop.yml down -v
