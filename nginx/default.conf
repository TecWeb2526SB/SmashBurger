server {
    listen 80;
    server_name localhost;

    # La cartella dove Nginx cercherà i file (corrisponde al volume montato)
    root /var/www/html;
    index index.php index.html index.htm;

    # Se un file o cartella non esiste, reindirizza tutto a index.php (utile per i framework)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Blocco per processare i file PHP
    location ~ \.php$ {
        # 'php' è il nome del servizio nel docker-compose.yml, 9000 è la porta expose
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Nega l'accesso ai file nascosti (come .env o .git) per sicurezza extra
    location ~ /\. {
        deny all;
    }
}