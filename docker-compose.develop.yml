services:
  # 1. Nginx: Web Server e Reverse Proxy
  web:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: webapp_nginx
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    networks:
      - frontend_net
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  # 2. PHP-FPM: Esecuzione del codice PHP
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: webapp_php
    expose:
      - "9000"
    networks:
      - frontend_net
      - backend_net
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
      - mailpit

  # 3. Database SQL (PostgreSQL 16)
  db:
    image: postgres:16-alpine
    container_name: webapp_postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-progetto_db}
      POSTGRES_USER: ${DB_USER:-utente_fallback}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password_fallback_sicura_123}
    networks:
      - backend_net
    volumes:
      - db_data:/var/lib/postgresql/data

  # 4. Mailpit: Simulatore Email
  mailpit:
    image: axllent/mailpit
    container_name: webapp_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
    expose:
      - "1025"
    networks:
      - frontend_net
      - backend_net

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true

volumes:
  db_data: